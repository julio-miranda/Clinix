<!-- patient-form.html -->
<section class="page">

  <div class="detail-header">
    <div>
      <h1>Formulario de paciente</h1>
      <p>Crear o editar información del paciente</p>
    </div>

    <div class="toolbar">
      <a href="#/pacientes" class="btn-secondary"
        style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">
        ← Volver
      </a>
    </div>
  </div>

  <form id="patientForm" class="card">

    <input type="hidden" name="id" />

    <label>MRN</label>
    <input name="medical_record_number" readonly />
    <small>Se genera automáticamente al guardar.</small>

    <label>DUI</label>
    <input
      name="dui"
      inputmode="numeric"
      autocomplete="off"
      placeholder="00000000-0"
      maxlength="10"
    />
    <small>Ejemplo: 12345678-9</small>

    <label>Nombre</label>
    <input name="first_name" />

    <label>Apellido</label>
    <input name="last_name" />

    <label>Fecha de nacimiento</label>
    <input type="date" name="birth_date" />

    <label>Sexo</label>
    <select id="sex_id" name="sex_id"></select>

    <label>Ocupación</label>
    <input name="occupation" />

    <label>Teléfono</label>
    <input name="phone" />

    <label>Dirección</label>
    <input name="address" />

    <div class="form-section" style="margin-top: 18px;">
      <h2>Signos vitales de referencia</h2>
      <p style="margin-top: 0;">Se autocompletan en la consulta cuando selecciones al paciente.</p>

      <div class="grid-3">
        <div>
          <label for="weight_kg">Peso (kg)</label>
          <input type="number" step="0.01" name="weight_kg" id="weight_kg" />
        </div>

        <div>
          <label for="height_cm">Altura (cm)</label>
          <input type="number" step="0.01" name="height_cm" id="height_cm" />
        </div>

        <div>
          <label for="temperature_c">Temperatura (°C)</label>
          <input type="number" step="0.1" name="temperature_c" id="temperature_c" />
        </div>

        <div>
          <label for="systolic_bp">Presión sistólica</label>
          <input type="number" name="systolic_bp" id="systolic_bp" />
        </div>

        <div>
          <label for="diastolic_bp">Presión diastólica</label>
          <input type="number" name="diastolic_bp" id="diastolic_bp" />
        </div>

        <div>
          <label for="pulse_rate">Pulso</label>
          <input type="number" name="pulse_rate" id="pulse_rate" />
        </div>

        <div>
          <label for="respiratory_rate">Frecuencia respiratoria</label>
          <input type="number" name="respiratory_rate" id="respiratory_rate" />
        </div>
      </div>
    </div>

    <label>
      <input type="checkbox" name="active" />
      Activo
    </label>

    <div class="form-actions">
      <a href="#/pacientes" class="btn-secondary"
        style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center;">
        Cancelar
      </a>

      <button type="submit">Guardar</button>
    </div>

  </form>
</section>
